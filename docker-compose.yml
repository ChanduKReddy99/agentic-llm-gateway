version: "3.9"

# =============================================================
# Agentic AI + LLM Gateway — Docker Desktop Stack
# =============================================================
# Runs entirely in Docker Desktop (Mac, Windows, Linux).
# No Kubernetes, no Helm, no cloud required.
#
# Start:   docker-compose up -d
# Stop:    docker-compose down
# Logs:    docker-compose logs -f <service>
# Reset:   docker-compose down -v  (deletes all data volumes)
#
# Services and ports:
#   Redis          :6379   (LiteLLM semantic cache)
#   LiteLLM proxy  :4000   (LLM gateway)
#   Postgres       :5432   (Langfuse database)
#   Langfuse       :3001   (LLM observability UI)
#   Prometheus     :9090   (metrics)
#   Loki           :3100   (logs)
#   Tempo          :3200   (traces)
#   Grafana        :3000   (dashboards)
#
# Your FastAPI app runs locally: make app (port 8000)
# =============================================================

networks:
  agentic-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

services:

  # ─── Redis ──────────────────────────────────────────────────
  # LiteLLM uses Redis for semantic caching
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── LiteLLM Proxy (THE GATEWAY) ────────────────────────────
  # All LLM calls route through here.
  # Handles: semantic cache, fallbacks, routing, cost tracking.
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.40.10   # pinned stable version
    container_name: agentic-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./docker/litellm_config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_HOST=http://langfuse-server:3000   # internal docker network
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Postgres ───────────────────────────────────────────────
  # Langfuse backend database
  postgres:
    image: postgres:15-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB:       langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Langfuse ───────────────────────────────────────────────
  # LLM observability: traces, costs, prompt versions, evals
  # UI: http://localhost:3001  login: admin@example.com / password
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: agentic-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse

      # Auth (change in production)
      NEXTAUTH_SECRET: mysecret-change-in-prod
      SALT:            mysalt-change-in-prod
      NEXTAUTH_URL:    http://localhost:3001

      # Auto-create admin user + project + API keys on first boot.
      # Keys match .env.example — no manual setup needed.
      LANGFUSE_INIT_USER_EMAIL:             admin@example.com
      LANGFUSE_INIT_USER_PASSWORD:          password
      LANGFUSE_INIT_USER_NAME:              Admin
      LANGFUSE_INIT_ORG_ID:                 agentic-ai-org
      LANGFUSE_INIT_ORG_NAME:               "Agentic AI"
      LANGFUSE_INIT_PROJECT_ID:             agentic-ai-project
      LANGFUSE_INIT_PROJECT_NAME:           "Agentic LLM Gateway"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY:     pk-lf-agentic-local-public
      LANGFUSE_INIT_PROJECT_SECRET_KEY:     sk-lf-agentic-local-secret

      TELEMETRY_ENABLED:                    "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      LANGFUSE_LOG_LEVEL:                   warn
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Prometheus ─────────────────────────────────────────────
  # Scrapes metrics from: app (:8000/metrics) + LiteLLM (:4000/metrics)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: agentic-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - agentic-net

  # ─── Loki ───────────────────────────────────────────────────
  # Log aggregation — receives structured JSON logs from app
  loki:
    image: grafana/loki:2.9.2
    container_name: agentic-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Tempo ──────────────────────────────────────────────────
  # Distributed tracing backend
  # Receives OTLP traces from the app on port 4317
  tempo:
    image: grafana/tempo:2.3.1
    container_name: agentic-tempo
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC — app sends traces here
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query API (Grafana reads from here)
    volumes:
      - ./docker/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo         # named volume, not /tmp
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - agentic-net

  # ─── Grafana ────────────────────────────────────────────────
  # Unified dashboards: metrics (Prometheus) + logs (Loki) + traces (Tempo)
  # UI: http://localhost:3000  login: admin / admin
  grafana:
    image: grafana/grafana:10.2.0
    container_name: agentic-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_FEATURE_TOGGLES_ENABLE:  traceqlEditor
      # Disable analytics/telemetry
      GF_ANALYTICS_REPORTING_ENABLED:       "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:       "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # FastAPI App — run locally with: make app
  # Uncomment below to run the app inside Docker too.
  # When running in Docker, change these env vars:
  #   LITELLM_PROXY_URL  → http://litellm:4000
  #   REDIS_URL          → redis://redis:6379
  #   REDIS_HOST         → redis
  #   OTEL_EXPORTER_...  → http://tempo:4317
  #   LANGFUSE_HOST      → http://langfuse-server:3000
  # ─────────────────────────────────────────────────────────────
  # app:
  #   build: .
  #   container_name: agentic-app
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   environment:
  #     - LITELLM_PROXY_URL=http://litellm:4000
  #     - REDIS_URL=redis://redis:6379
  #     - REDIS_HOST=redis
  #     - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
  #     - LANGFUSE_HOST=http://langfuse-server:3000
  #   depends_on:
  #     litellm:
  #       condition: service_healthy
  #     langfuse-server:
  #       condition: service_healthy
  #   networks:
  #     - agentic-net
